<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Time Limit Reached</title>
<style>
body{margin:0;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:sans-serif;background:linear-gradient(135deg,#3b82f6,#ec4899);color:white;text-align:center;}
.card{background:rgba(255,255,255,0.15);padding:40px;border-radius:20px;backdrop-filter:blur(15px);box-shadow:0 0 40px rgba(0,0,0,0.3);width:500px;}
h1{font-size:42px;margin-bottom:10px;}
.footer{position:fixed;bottom:20px;right:30px;font-weight:bold;opacity:0.8;}
button{margin-top:20px;padding:10px 20px;border:none;border-radius:10px;background:white;color:#3b82f6;font-weight:bold;cursor:pointer;}
button:hover{opacity:0.85;}
</style>
</head>
<body>
<div class="card">
<h1>⏳ Time Limit Ran Out</h1>
<p>Your browsing time has ended for today.</p>
<p>Please ask a parent if you need more time.</p>
<button onclick="location.href='candy://about'">Return Home</button>
</div>
<div class="footer">Cannnddyy</div>
</body>
</html>
